# Fly.io deploy config - CaptionAI Finder (7/24 email autopilot)
# Kurulum: `fly launch --no-deploy` (bu dosyayi korur) -> secrets -> `fly deploy`
# app adini kendine gore degistir.

app = "captionai-finder"
primary_region = "fra"  # sana yakin bolge: fra (Frankfurt), ams, cdg...

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  DATA_DIR = "/data"
  AUTOSTART = "1"
  REQUIRE_EMAIL = "1"
  STRICT_COUNTRY = "1"
  # Hedefleme (istedigin gibi degistir):
  COUNTRIES = "Turkiye"
  HASHTAGS = "yemektarifi, gunlukvlog, kombin, gymtok, gezilecekyerler"
  MIN_FOLLOWERS = "3000"
  MAX_FOLLOWERS = "80000"
  TARGET_COUNT = "60"
  # Kimse kalmayinca durma; bu kadar sn bekleyip tekrar tara (7/24). 0 = dur.
  IDLE_SLEEP = "3600"
  DAILY_LIMIT = "30"
  EMAIL_SUBJECT = "videolarin icin ufak bir sey"

# Kalici disk: SQLite DB + seen_history burada durur (redeploy'da SILINMEZ).
[[mounts]]
  source = "finder_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # 7/24 acik kalsin diye makine uyumasin:
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
